name: kehuojingling
runtime: node
buildCommand: npm install && npx prisma generate && npm run build
startCommand: npx next start
envVars:
  - key: NODE_ENV
    value: production
  - key: NEXTAUTH_SECRET
    generateValue: true
  - key: NEXTAUTH_URL
    value: https://kehuojingling.onrender.com
  - key: OPENAI_API_KEY
    sync: false
  - key: DATABASE_URL
    fromDatabase:
      name: kehuojingling-db
      property: connectionString

databases:
  - name: kehuojingling-db
    databaseName: kehuojingling
    user: kehuojingling
    plan: free
